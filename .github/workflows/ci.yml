name: CI

# Pipeline gates `main` only — `develop` is the working branch where in-flight
# work lives without CI cost. Build + test runs on direct pushes to `main`
# (which includes the squash-merge of a `develop -> main` release PR).
# PR runs are intentionally not wired up: the post-merge push covers the
# same code and avoids a duplicate release attempt where one of the two
# would fail the version-already-exists check.
#
# Releases are fully automatic on push to main: the version is read once
# from fbide_version() in CMakeLists.txt; the build matrix builds and
# tests both x64 and x86; if no `v<version>` tag exists yet, a single
# GitHub Release is published with both arch zips attached. Existing
# version on push fails the workflow.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'resources/pristine/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'configured_files/**'
      - 'packaging/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/setup-wx/**'
  # Manual trigger lets the workflow run on any branch and pick a build
  # type — useful for one-off Debug repros without changing the script.
  # Manual runs do NOT publish releases.
  workflow_dispatch:
    inputs:
      build_type:
        description: CMake build type for FBIde + tests.
        required: true
        default: Release
        type: choice
        options: [Release, Debug, RelWithDebInfo]
      # Per-target gates for manual runs. Defaults match push-to-main
      # (everything builds). Push events don't expose `inputs.*`, so the
      # job-level guards fall through to true for those.
      build_win64:
        description: Build Windows x64
        required: false
        default: true
        type: boolean
      build_win32:
        description: Build Windows x86
        required: false
        default: true
        type: boolean
      build_linux_appimage:
        description: Build Linux AppImage
        required: false
        default: true
        type: boolean
      build_macos_arm64:
        description: Build macOS DMG (arm64)
        required: false
        default: true
        type: boolean
      build_macos_x86_64:
        description: Build macOS DMG (x86_64)
        required: false
        default: true
        type: boolean
      publish_release:
        description: Publish a GitHub Release with the built artefacts
        required: false
        default: true
        type: boolean

# Cancel an older run on the same ref/PR when a new one starts — saves runner
# minutes when commits land in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS-based action into Node 24 ahead of GitHub's June 2026
# default switch. Lets us stay on stable major tags (actions/checkout@v5,
# ilammy/msvc-dev-cmd@v1, etc.) without waiting for upstream re-tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Resolve the configured FBIde version once per workflow run and decide
  # whether this run is going to publish a release. Uses the real
  # CMakeLists.txt with -DFBIDE_VERSION_ONLY=ON, which short-circuits
  # before any compiler detection or wxWidgets lookup — so this runs on
  # Ubuntu without MSVC.
  version:
    name: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.value }}
      tag: ${{ steps.resolve.outputs.tag }}
      release: ${{ steps.resolve.outputs.release }}
      win-archs: ${{ steps.targets.outputs.win-archs }}
      build-linux-appimage: ${{ steps.targets.outputs.build-linux-appimage }}
      macos-targets: ${{ steps.targets.outputs.macos-targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full tag list so the existing-tag check has the truth.
          fetch-tags: true
          fetch-depth: 0

      # Hosted Ubuntu runner ships an older CMake; FBIde requires 4.0+.
      - name: Set up CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Resolve version (and verify it is unreleased)
        id: resolve
        shell: bash
        run: |
          cmake -B build/version-probe -S . -DFBIDE_VERSION_ONLY=ON
          version="$(cat build/version-probe/version.txt)"
          tag="v${version}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          # Only push-to-main runs publish releases; workflow_dispatch is
          # build-and-test only.
          # Push-to-main always publishes; workflow_dispatch can opt in
          # via the publish_release checkbox so manual runs from any
          # branch can produce a tagged release when the operator wants
          # one. Either way, the tag-doesn't-exist guard runs first to
          # keep us from clobbering a published version.
          publish=false
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            publish=true
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ inputs.publish_release }}" = "true" ]; then
            publish=true
          fi

          if [ "${publish}" = "true" ]; then
            if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "::error::Release ${tag} already exists. Bump fbide_version() in CMakeLists.txt before publishing."
              exit 1
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      # Resolve which targets to build into a JSON arch list (consumed by
      # build-and-test's matrix) plus a boolean for the AppImage job.
      # Push events build everything; workflow_dispatch honours the
      # per-target checkboxes from the run dialog.
      - name: Resolve build targets
        id: targets
        shell: bash
        env:
          BUILD_WIN64: ${{ inputs.build_win64 }}
          BUILD_WIN32: ${{ inputs.build_win32 }}
          BUILD_LINUX: ${{ inputs.build_linux_appimage }}
          BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          BUILD_MACOS_X86_64: ${{ inputs.build_macos_x86_64 }}
        run: |
          # macos-targets is a JSON list of {arch, runner} objects fed
          # directly into build-macos's matrix.include. Both arches run
          # on macos-14 (Apple Silicon, Sonoma): arm64 builds natively,
          # x86_64 cross-compiles via Rosetta + a side-by-side x86_64
          # Homebrew install. Sonoma is the floor because Homebrew
          # ships pre-built LLVM bottles only for Sonoma+.
          mac_arm='{"arch":"arm64","runner":"macos-14"}'
          mac_x86='{"arch":"x86_64","runner":"macos-14"}'
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo 'win-archs=["x64","x86"]' >> "$GITHUB_OUTPUT"
            echo 'build-linux-appimage=true' >> "$GITHUB_OUTPUT"
            echo "macos-targets=[${mac_arm},${mac_x86}]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          archs=()
          [ "$BUILD_WIN64" = "true" ] && archs+=('"x64"')
          [ "$BUILD_WIN32" = "true" ] && archs+=('"x86"')
          IFS=,
          echo "win-archs=[${archs[*]}]" >> "$GITHUB_OUTPUT"
          echo "build-linux-appimage=${BUILD_LINUX:-true}" >> "$GITHUB_OUTPUT"
          mac=()
          [ "${BUILD_MACOS_ARM64:-true}" = "true" ] && mac+=("${mac_arm}")
          [ "${BUILD_MACOS_X86_64:-true}" = "true" ] && mac+=("${mac_x86}")
          IFS=,
          echo "macos-targets=[${mac[*]}]" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: build-and-test (${{ matrix.arch }})
    needs: version
    if: needs.version.outputs.win-archs != '[]'
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      # Run both archs to completion even if one fails — easier to see
      # which platform broke.
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.version.outputs.win-archs) }}
    permissions:
      contents: read
    # Manual runs honour the chosen build type; push-to-main defaults to
    # Release (matches what the wxWidgets dist is built for).
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSVC dev environment (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.arch }}

      # Hosted runners ship with CMake 3.31, but FBIde requires 4.0+
      # (CMakeLists.txt:1 cmake_minimum_required). lukka/get-cmake also
      # provides Ninja, so a separate gha-setup-ninja step isn't needed
      # (gha-setup-ninja is archived as of May 2025). Track @latest on
      # both the action and the CMake release — pin only if a future
      # CMake release breaks the build.
      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Set up wxWidgets
        id: wx
        uses: ./.github/actions/setup-wx
        with:
          wx-ref: v3.3.2
          build-type: ${{ env.BUILD_TYPE }}
          arch: ${{ matrix.arch }}

      # WXWIN switches cmake/wxwidgets.cmake to CONFIG mode, which finds
      # wxWidgetsConfig.cmake under <dist>/lib/cmake/wxWidgets/. The
      # alternate path (wxWidgets_ROOT_DIR + legacy FindwxWidgets) expects
      # the prebuilt-binaries layout we don't ship from `cmake --install`.
      - name: Configure
        run: >
          cmake -G Ninja -B build/ci
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DBUILD_TESTING=ON
          -DWXWIN=${{ steps.wx.outputs.wx-root }}

      # Build everything (fbide.exe + tests). The release packaging step
      # below reuses fbide.exe from this build — the small extra link is
      # paid for by avoiding a second configure / build pass on push.
      - name: Build
        run: cmake --build build/ci

      - name: Test
        working-directory: build/ci
        run: ctest --output-on-failure

      # ---------- Release artefact (push to main, all archs) ----------
      # Each matrix instance produces its own zip; the release job
      # downloads and attaches both to a single GitHub Release.

      - name: Stage install payload
        if: needs.version.outputs.release == 'true'
        run: cmake --install build/ci --prefix package

      # The READONLY sentinel marks a bundled ide/ directory as immutable, so
      # FBIde mirrors it to the user data dir on launch. Portable Windows zips
      # run in-place from a writable folder and edit ide/ directly — strip the
      # sentinel here. It belongs only in the AppImage distribution.
      - name: Strip READONLY sentinel from Windows payload
        if: needs.version.outputs.release == 'true'
        shell: pwsh
        run: Remove-Item -Force -Path package/ide/READONLY

      - name: Zip release artefact
        if: needs.version.outputs.release == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $arch = "${{ matrix.arch == 'x64' && '64' || '32' }}"
          $zip = "fbide-$version-win$arch.zip"
          Compress-Archive -Path package\* -DestinationPath $zip -Force
          "RELEASE_ZIP=$zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload release artefact
        if: needs.version.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: ${{ env.RELEASE_ZIP }}
          retention-days: 1
          if-no-files-found: error

  # ----------------------------------------------------------------------------
  # Linux AppImage. Release-only — gated on the same `version.release` flag as
  # the Windows zips. Builds wxGTK3 via the shared setup-wx action (Linux
  # branch), compiles FBIde with -DBUILD_APPIMAGE=ON so the install layout
  # follows FHS, then assembles an AppDir and runs linuxdeploy to produce a
  # self-contained AppImage. Built on the latest Ubuntu LTS — glibc on the
  # runner sets the lower-bound for systems the AppImage will run on.
  # ----------------------------------------------------------------------------
  build-linux-appimage:
    name: build-linux-appimage
    needs: version
    if: needs.version.outputs.build-linux-appimage == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libglib2.0-dev libsecret-1-dev libnotify-dev \
            imagemagick file fuse libfuse2

      - name: Set up wxWidgets (GTK3)
        id: wx
        uses: ./.github/actions/setup-wx
        with:
          wx-ref: v3.3.2
          build-type: ${{ env.BUILD_TYPE }}

      # WXWIN switches cmake/wxwidgets.cmake to CONFIG mode (matches the
      # Windows path) and finds wxWidgetsConfig.cmake under the cached
      # dist's lib/cmake/wxWidgets/. wxWidgets_ROOT_DIR + the legacy
      # FindwxWidgets module expects the prebuilt-binaries layout we don't
      # produce from `cmake --install`.
      - name: Configure
        run: >
          cmake -G Ninja -B build/ci
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DBUILD_TESTING=ON
          -DBUILD_APPIMAGE=ON
          -DWXWIN=${{ steps.wx.outputs.wx-root }}

      - name: Build
        run: cmake --build build/ci

      # CTest exists for parity with the Windows job; skip GUI tests because
      # the runner has no display (xvfb would mask real failures). GUI suites
      # carry the `gui` label (see tests/CMakeLists.txt).
      - name: Test (non-GUI)
        working-directory: build/ci
        run: ctest --output-on-failure -LE gui

      - name: Stage AppDir
        run: |
          set -eux
          APPDIR="${GITHUB_WORKSPACE}/AppDir"
          rm -rf "${APPDIR}"
          cmake --install build/ci --prefix "${APPDIR}/usr"

          # Convert the Windows .ico to PNG for the desktop icon. Pick the
          # largest frame the .ico contains so HiDPI scaling has source
          # data; ImageMagick chooses by area.
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"
          convert "src/lib/rc/fbide.ico[0]" -resize 256x256 \
            "${APPDIR}/usr/share/icons/hicolor/256x256/apps/fbide.png"

          # Top-level icon + .desktop are what AppRun grep's against and
          # what AppImage tooling expects at the AppDir root.
          cp "${APPDIR}/usr/share/icons/hicolor/256x256/apps/fbide.png" "${APPDIR}/fbide.png"

          install -Dm644 packaging/linux/fbide.desktop \
            "${APPDIR}/usr/share/applications/fbide.desktop"
          cp packaging/linux/fbide.desktop "${APPDIR}/fbide.desktop"

          # AppStream MetaInfo. The component id (reverse-DNS) doubles as
          # the file's basename — software centres key off the path, so
          # the leaf must match the <id> inside the XML.
          install -Dm644 packaging/linux/fbide.metainfo.xml \
            "${APPDIR}/usr/share/metainfo/io.github.albeva.fbide.metainfo.xml"

          install -Dm755 packaging/linux/AppRun "${APPDIR}/AppRun"

      - name: Download linuxdeploy
        run: |
          set -eux
          curl -fL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fL -o linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk

      - name: Build AppImage
        env:
          LDAI_OUTPUT: fbide-${{ needs.version.outputs.version }}-x86_64.AppImage
        run: |
          set -eux
          export PATH="${GITHUB_WORKSPACE}:${PATH}"
          ./linuxdeploy --appdir AppDir --plugin gtk --output appimage
          test -f "${LDAI_OUTPUT}"
          echo "RELEASE_APPIMAGE=${LDAI_OUTPUT}" >> "$GITHUB_ENV"

      - name: Upload release artefact
        if: needs.version.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-appimage
          path: ${{ env.RELEASE_APPIMAGE }}
          retention-days: 1
          if-no-files-found: error

  # ----------------------------------------------------------------------------
  # macOS DMG. Per-arch builds because FBIde uses Homebrew clang's libc++
  # for C++23 stdlib coverage (std::ranges::contains and friends Apple's
  # libc++ doesn't yet ship), and Homebrew bottles are per-arch — so the
  # bundled libc++ inside the .app must match the binary's arch.
  # Both arches run on macos-14 (Apple Silicon, Sonoma). arm64 builds
  # natively against arm64 Homebrew at /opt/homebrew. x86_64 cross-
  # compiles via Rosetta against x86_64 Homebrew at /usr/local — both
  # Homebrew trees coexist on the runner. Produces two DMGs mirroring
  # the Windows x64/x86 split.
  # ----------------------------------------------------------------------------
  build-macos:
    name: build-macos (${{ matrix.arch }})
    needs: version
    if: needs.version.outputs.macos-targets != '[]'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.version.outputs.macos-targets) }}
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
      # Single source of truth for the macOS floor — passed to both wx
      # (via setup-wx) and to FBIde's configure. Keep aligned with
      # LSMinimumSystemVersion in configured_files/Info.plist.in.
      MACOSX_DEPLOYMENT_TARGET: '14.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      # Homebrew LLVM gives us a modern libc++ that ships C++23 stdlib
      # features (std::ranges::contains, etc.) Apple's libc++ doesn't
      # have yet. dylibbundler is used post-build to fold the Homebrew
      # libc++ dylib into the .app so end-user Macs without Homebrew
      # can still run it. CC / CXX get persisted into $GITHUB_ENV so
      # both the wxWidgets build (via setup-wx) and the FBIde configure
      # step below pick them up automatically — no duplication.
      #
      # arm64 uses the native /opt/homebrew tree. x86_64 cross-compiles
      # under Rosetta against a side-by-side /usr/local Homebrew tree:
      # `arch -x86_64 brew install …` lands x86_64 bottles there, and
      # the x86_64 clang from /usr/local/opt/llvm runs under Rosetta
      # when invoked. Hosted macos-14 runners usually ship the x86_64
      # brew prefix pre-installed; we bootstrap it if missing.
      - name: Install Homebrew toolchain (LLVM + dylibbundler)
        run: |
          set -eux
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            # Rosetta is normally present on macos-14; --install-rosetta
            # is idempotent and exits zero if already installed.
            sudo softwareupdate --install-rosetta --agree-to-license
            if [ ! -x /usr/local/bin/brew ]; then
              NONINTERACTIVE=1 arch -x86_64 /bin/bash -c \
                "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            fi
            BREW=(arch -x86_64 /usr/local/bin/brew)
          else
            BREW=(/opt/homebrew/bin/brew)
          fi
          # Pinning to llvm@20 (vs the latest `llvm` formula) sidesteps
          # a libc++ self-check added in LLVM 22 that rejects the
          # header-search order wxWidgets's macOS CMake produces. wx
          # puts `-I${SDK}/usr/include` at the front of its target's
          # include flags, which sits ahead of clang's own libc++
          # headers; LLVM 22's `<cstddef>` then asserts on not finding
          # libc++'s `<stddef.h>` first and bails. LLVM 20 (still on
          # libc++ 20) doesn't have that assertion, and its `<cstddef>`
          # works fine through Apple's stddef.h — which is what
          # Apple Clang has always done. llvm@20 still ships the
          # C++23 stdlib we care about (std::ranges::contains et al.,
          # which landed in libc++ 18).
          #
          # `--overwrite` lets brew claim files at /usr/local/bin/ for
          # the named formulae, but does NOT propagate to transitive
          # deps (e.g. python pulled in by llvm@20). On macos-14's
          # x86_64 Homebrew, python@3.x trips over the runner's
          # pre-shipped /usr/local/bin/idle3 etc. and brew exits
          # non-zero. We don't actually need anything linked into
          # /usr/local/bin/ — the FBIde / wx builds use absolute
          # `${LLVM_PREFIX}/bin/...` paths and dylibbundler is
          # reached via PATH below. So tolerate the link failure,
          # then verify the Cellar contents.
          "${BREW[@]}" install --overwrite llvm@20 dylibbundler || true
          LLVM_PREFIX="$("${BREW[@]}" --prefix llvm@20)"
          DYLIBBUNDLER_PREFIX="$("${BREW[@]}" --prefix dylibbundler)"
          if [ ! -x "${LLVM_PREFIX}/bin/clang++" ]; then
            echo "::error::llvm@20 not installed at ${LLVM_PREFIX}"
            exit 1
          fi
          if [ ! -x "${DYLIBBUNDLER_PREFIX}/bin/dylibbundler" ]; then
            echo "::error::dylibbundler not installed at ${DYLIBBUNDLER_PREFIX}"
            exit 1
          fi
          echo "CC=${LLVM_PREFIX}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          # Put both formulae on PATH so dylibbundler is reachable
          # from packaging/macos/bundle-dylibs.sh even when brew's
          # link step didn't drop a /usr/local/bin/dylibbundler
          # symlink (collateral damage from the link-failure above).
          echo "PATH=${LLVM_PREFIX}/bin:${DYLIBBUNDLER_PREFIX}/bin:${PATH}" >> "$GITHUB_ENV"
          # Homebrew LLVM is keg-only: libc++ / libunwind live under
          # subdirs of $LLVM_PREFIX/lib and aren't on the linker's
          # default search path. Without these LDFLAGS the link would
          # silently fall through to Apple's libc++ (the SDK one),
          # which is exactly the older libc++ we're trying to avoid.
          # _LIBCPP_DISABLE_AVAILABILITY is required for newer C++23
          # stdlib symbols (std::ranges::contains etc.) — Homebrew
          # libc++ marks them as "unavailable on this OS" through
          # availability annotations otherwise. CMake honours CXXFLAGS
          # / LDFLAGS on first configure (seeds CMAKE_*_FLAGS_INIT —
          # note CMake doesn't read CPPFLAGS, so the -D belongs in
          # CXXFLAGS), so both the wx and fbide configures pick them
          # up.
          echo "CXXFLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L${LLVM_PREFIX}/lib/c++ -L${LLVM_PREFIX}/lib/unwind -lunwind" >> "$GITHUB_ENV"

      - name: Set up wxWidgets (osx_cocoa, ${{ matrix.arch }})
        id: wx
        uses: ./.github/actions/setup-wx
        with:
          wx-ref: v3.3.2
          build-type: ${{ env.BUILD_TYPE }}
          arch: ${{ matrix.arch }}

      # Single-arch configure — the matrix runs this twice (once per
      # arch), each on its native runner. CC / CXX flow in from the
      # job-level Homebrew step so this configure picks up Homebrew
      # clang automatically (matches the toolchain wx was built with,
      # so ABIs line up at link time).
      - name: Configure
        run: >
          cmake -G Ninja -B build/ci
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DBUILD_TESTING=ON
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0
          -DWXWIN=${{ steps.wx.outputs.wx-root }}

      - name: Build
        run: cmake --build build/ci

      # GUI tests carry the `gui` label (see tests/CMakeLists.txt) and
      # are Windows-targeted; skip them here just like the Linux job.
      # The macOS runners are native for each matrix arm, so the test
      # binaries run host-native (no Rosetta on the test path).
      - name: Test (non-GUI)
        working-directory: build/ci
        run: ctest --output-on-failure -LE gui

      # Spot-check: the produced binary should be single-arch matching
      # the matrix. Catches a future toolchain change quietly producing
      # a fat binary the bundler can't handle (Homebrew libc++ is
      # per-arch only).
      - name: Verify single-arch binary
        run: |
          set -eux
          binary="bin/fbide.app/Contents/MacOS/fbide"
          file "$binary"
          arches=$(lipo -archs "$binary")
          echo "Arches: $arches"
          [ "$arches" = "${{ matrix.arch }}" ]

      # Fold the Homebrew libc++ / libc++abi / libunwind dylibs into
      # Contents/Frameworks/ and rewrite the binary's load commands to
      # @executable_path/../Frameworks/. End-user Macs without
      # Homebrew can then run the .app stand-alone.
      - name: Bundle Homebrew dylibs into .app
        run: packaging/macos/bundle-dylibs.sh bin/fbide.app

      - name: Build DMG
        if: needs.version.outputs.release == 'true'
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -eux
          dmg="$(packaging/macos/build-dmg.sh bin/fbide.app "${VERSION}" "${{ matrix.arch }}" .)"
          echo "RELEASE_DMG=$(basename "${dmg}")" >> "$GITHUB_ENV"

      - name: Upload release artefact
        if: needs.version.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-${{ matrix.arch }}
          path: ${{ env.RELEASE_DMG }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: release
    needs: [version, build-and-test, build-linux-appimage, build-macos]
    # `always()` runs the gate regardless of whether upstream jobs were
    # skipped (selective targets via workflow_dispatch) or not. Then we
    # require a publishable run AND at least one upstream success — a
    # full skip / failure across every build job leaves nothing to
    # release.
    if: |
      always()
      && needs.version.outputs.release == 'true'
      && (needs.build-and-test.result == 'success'
          || needs.build-linux-appimage.result == 'success'
          || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts
          pattern: release-*
          merge-multiple: true

      # softprops/action-gh-release creates the tag (on the run's commit
      # SHA) and the matching release in one step. Pre-release flag is
      # auto-derived: any version containing '-' (i.e. has an
      # .alpha-N / .beta-N / .rc-N suffix) is marked pre-release.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FBIde ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artefacts/*.zip
            artefacts/*.AppImage
            artefacts/*.dmg
