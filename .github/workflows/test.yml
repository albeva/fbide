name: test

# Pipeline gates `main` only — `develop` is the working branch where in-flight
# work lives without CI cost. Tests run on every PR targeting `main` (i.e.
# `develop -> main` release PRs) and on direct pushes to `main`.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'resources/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'configured_files/**'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-wx/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'resources/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'configured_files/**'
      - '.github/workflows/test.yml'
      - '.github/actions/setup-wx/**'
    # Tag pushes drive a release: same job runs the full test gate, then
    # packages and uploads to GitHub Releases. Tag must be a SemVer-ish
    # `v<full-version>` matching the configured FBIDE_FULL_VERSION
    # (e.g. v0.5.0, v0.5.0.beta-1, v0.5.0.rc-2).
    tags: ['v*']
  # Manual trigger lets the workflow run on any branch and pick a build
  # type — useful for one-off Debug repros without changing the script.
  workflow_dispatch:
    inputs:
      build_type:
        description: CMake build type for FBIde + tests.
        required: true
        default: Release
        type: choice
        options: [Release, Debug, RelWithDebInfo]

# Cancel an older run on the same ref/PR when a new one starts — saves runner
# minutes when commits land in quick succession.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS-based action into Node 24 ahead of GitHub's June 2026
# default switch. Lets us stay on stable major tags (actions/checkout@v4,
# ilammy/msvc-dev-cmd@v1, etc.) without waiting for upstream re-tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30
    # `contents: write` is needed for the release-publish step on tag
    # pushes; harmless on non-tag runs (the step is gated by `if`).
    permissions:
      contents: write
    # Manual runs honour the chosen build type; PR / push runs default to
    # Release (matches what the wxWidgets dist is built for).
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      # Hosted runners ship with CMake 3.31, but FBIde requires 4.0+
      # (CMakeLists.txt:1 cmake_minimum_required). lukka/get-cmake also
      # provides Ninja, so a separate gha-setup-ninja step isn't needed
      # (gha-setup-ninja is archived as of May 2025). Track @latest on
      # both the action and the CMake release — pin only if a future
      # CMake release breaks the build.
      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Set up wxWidgets
        id: wx
        uses: ./.github/actions/setup-wx
        with:
          wx-ref: v3.3.2
          build-type: ${{ env.BUILD_TYPE }}

      # WXWIN switches cmake/wxwidgets.cmake to CONFIG mode, which finds
      # wxWidgetsConfig.cmake under <dist>/lib/cmake/wxWidgets/. The
      # alternate path (wxWidgets_ROOT_DIR + legacy FindwxWidgets) expects
      # the prebuilt-binaries layout we don't ship from `cmake --install`.
      - name: Configure
        run: >
          cmake -G Ninja -B build/ci
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DWXWIN=${{ steps.wx.outputs.wx-root }}

      # Build everything (fbide.exe + tests). The release packaging step
      # added later reuses fbide.exe from this build; the small extra link
      # is paid for by avoiding a second full configure+build on tag push.
      - name: Build
        run: cmake --build build/ci

      - name: Test
        working-directory: build/ci
        run: ctest --output-on-failure

      # ---------- Release (tag push only) ----------
      # Everything below runs only when the trigger is a `v*` tag push.
      # The fbide.exe + fbide_lib already built above are reused — no
      # second configure / build pass.

      # Verify the git tag matches the version configured by
      # fbide_version() in CMakeLists.txt. Mismatches would publish a
      # zip whose filename / binary metadata disagrees with the GitHub
      # Release; fail fast instead.
      - name: Verify tag matches configured version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          configured="$(cat build/ci/version.txt)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$configured" != "$tag" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' (= $tag) does not match configured version '$configured' from CMakeLists.txt"
            exit 1
          fi
          echo "FBIDE_VERSION=$configured" >> "$GITHUB_ENV"

      - name: Stage install payload
        if: startsWith(github.ref, 'refs/tags/v')
        run: cmake --install build/ci --prefix package

      - name: Zip release artefact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $zip = "fbide-$env:FBIDE_VERSION-win64.zip"
          Compress-Archive -Path package\* -DestinationPath $zip -Force
          "RELEASE_ZIP=$zip" | Out-File -Append $env:GITHUB_ENV

      # Pre-release flag is auto-derived: any tag containing '-' (i.e.
      # has an .alpha-N / .beta-N / .rc-N suffix) is published as a
      # pre-release on GitHub.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FBIde ${{ env.FBIDE_VERSION }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ env.RELEASE_ZIP }}
