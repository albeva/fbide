name: Set up wxWidgets
description: >
  Build (or restore from cache) a static wxWidgets dist matching FBIde's
  expected layout. Outputs `wx-root` pointing at the install prefix that can
  be passed straight to FBIde's CMake configure as `-DwxWidgets_ROOT_DIR=...`.
  Only the install prefix (`dist/`) is cached — sources and intermediate
  build trees are recreated on each cold run.

inputs:
  wx-ref:
    description: wxWidgets git tag or branch to build (e.g. v3.3.2).
    required: false
    default: v3.3.2
  build-type:
    description: >
      CMake build type for wxWidgets — must match the build type the
      downstream FBIde configure step uses, otherwise the wx static libs
      won't satisfy FBIde's link.
    required: false
    default: Release
  arch:
    description: >
      Target architecture. Windows: x64 | x86 (must match the MSVC dev
      environment). macOS: arm64 | x86_64 (single-arch builds, one
      DMG per arch). Linux ignores this (host arch only). Cache key
      partitions by arch so per-arch caches don't collide.
    required: false
    default: x64

outputs:
  wx-root:
    description: Absolute path to the wxWidgets install prefix (cached).
    value: ${{ steps.paths.outputs.wx-root }}

runs:
  using: composite
  steps:
    # Single source of truth for every directory the build touches. Both this
    # action and the vendored build-wx.bat read the same paths via env vars
    # below, so renaming a directory only requires editing this step.
    - name: Compute paths
      id: paths
      shell: bash
      run: |
        WORK="${{ github.workspace }}/wxwidgets"
        case "${RUNNER_OS}" in
          Windows)
            TOOLCHAIN="msvc/${{ inputs.arch }}"
            DIST_LEAF="${{ inputs.arch }}"
            ;;
          macOS)
            # Single-arch wx builds keyed on the input arch — FBIde
            # ships one DMG per arch, so wx is built per-arch to
            # match.
            TOOLCHAIN="osx_cocoa/${{ inputs.arch }}"
            DIST_LEAF="macos-${{ inputs.arch }}"
            ;;
          *)
            TOOLCHAIN="gtk3"
            DIST_LEAF="linux"
            ;;
        esac
        echo "wx-work=${WORK}" >> "$GITHUB_OUTPUT"
        echo "wx-src=${WORK}/src" >> "$GITHUB_OUTPUT"
        echo "wx-build=${WORK}/build/${TOOLCHAIN}/${{ inputs.build-type }}" >> "$GITHUB_OUTPUT"
        echo "wx-root=${WORK}/dist/${DIST_LEAF}" >> "$GITHUB_OUTPUT"

    # Cache key includes arch + build-type so per-arch and per-config
    # caches do not collide. Linux ignores the arch (host only); macOS
    # and Windows both partition by arch. hashFiles() perturbs the key
    # whenever the action or either build script changes, so manual
    # invalidation is rarely needed.
    - name: Restore wxWidgets cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.paths.outputs.wx-root }}
        key: wx-${{ runner.os }}-${{ inputs.arch }}-${{ inputs.wx-ref }}-${{ inputs.build-type }}-${{ hashFiles('.github/actions/setup-wx/action.yml', '.github/actions/setup-wx/build-wx.bat', '.github/actions/setup-wx/build-wx.sh') }}

    - name: Clone wxWidgets
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth=1 --branch "${{ inputs.wx-ref }}" --recurse-submodules \
          https://github.com/wxWidgets/wxWidgets.git "${{ steps.paths.outputs.wx-src }}"

    - name: Install Linux build dependencies
      if: steps.cache.outputs.cache-hit != 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ninja-build pkg-config \
          libgtk-3-dev libglib2.0-dev libsecret-1-dev libnotify-dev

    - name: Build wxWidgets (Windows)
      if: steps.cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: cmd
      env:
        WX_SRC_DIR: ${{ steps.paths.outputs.wx-src }}
        WX_BUILD_DIR: ${{ steps.paths.outputs.wx-build }}
        WX_DIST_DIR: ${{ steps.paths.outputs.wx-root }}
        WX_BUILD_TYPE: ${{ inputs.build-type }}
        WX_ARCH: ${{ inputs.arch }}
      run: ${{ github.action_path }}\build-wx.bat

    - name: Build wxWidgets (Linux)
      if: steps.cache.outputs.cache-hit != 'true' && runner.os == 'Linux'
      shell: bash
      env:
        WX_SRC_DIR: ${{ steps.paths.outputs.wx-src }}
        WX_BUILD_DIR: ${{ steps.paths.outputs.wx-build }}
        WX_DIST_DIR: ${{ steps.paths.outputs.wx-root }}
        WX_BUILD_TYPE: ${{ inputs.build-type }}
      run: bash "${{ github.action_path }}/build-wx.sh"

    - name: Build wxWidgets (macOS)
      if: steps.cache.outputs.cache-hit != 'true' && runner.os == 'macOS'
      shell: bash
      env:
        WX_SRC_DIR: ${{ steps.paths.outputs.wx-src }}
        WX_BUILD_DIR: ${{ steps.paths.outputs.wx-build }}
        WX_DIST_DIR: ${{ steps.paths.outputs.wx-root }}
        WX_BUILD_TYPE: ${{ inputs.build-type }}
        WX_ARCH: ${{ inputs.arch }}
      run: bash "${{ github.action_path }}/build-wx.sh"

    - name: Save wxWidgets cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.paths.outputs.wx-root }}
        key: ${{ steps.cache.outputs.cache-primary-key }}
