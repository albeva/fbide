; Shortcut definitions for Windows
version=0.5.0

; ============================================================================
; Define system shortcuts to use with menu and toolbar commands.
; Each command ID is shared with layout, locales, etc.
; Only commands that have a shortcut are listed.
;
; More info here:
; https://docs.wxwidgets.org/latest/classwx_menu_item.html#a8b0517fb35e3eada66b51568aa87f261
; ============================================================================
[commands]

; --- File ---
new=Ctrl+N
open=Ctrl+O
save=Ctrl+S
saveAs=Ctrl+Shift+S
close=Ctrl+F4
newWindow=Ctrl+Shift+N
quit=Alt+F4

; --- Edit ---
undo=Ctrl+Z
redo=Ctrl+Y
cut=Ctrl+X
copy=Ctrl+C
paste=Ctrl+V
selectAll=Ctrl+A
selectLine=Ctrl+L
; indentInc/indentDec: Tab/Shift+Tab handled by Scintilla internally — no menu accelerator
comment=Ctrl+/
uncomment=Ctrl+Shift+/

; --- Search ---
find=Ctrl+F
findNext=F3
replace=Ctrl+H
gotoLine=Ctrl+G

; --- View ---
viewResult=F4
viewBrowser=F2
viewSubs=Shift+F2

; --- Run ---
compile=Ctrl+F9
compileAndRun=F9
run=Ctrl+Shift+F9
quickRun=F5
cmdPrompt=Ctrl+`

; --- Help ---
help=F1
