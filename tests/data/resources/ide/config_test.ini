; ============================================================================
; Minimal FBIde config used by ui-tests. Owns only what the Editor +
; CodeTransformer code paths need: theme, keywords, locale, [editor] block.
; Do not depend on the production resources from this file.
; ============================================================================
version=0.5.0
theme=themes/classic.ini
locale=locales/en.ini
keywords=keywords.ini
[editor]
tabSize=4
syntaxHighlight=1
braceHighlight=1
lineNumbers=1
autoIndent=1
keywordCase=Upper
transformKeywords=1
encoding=UTF-8
eolMode=LF
