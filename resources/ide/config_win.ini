; ============================================================================
; FBIde configuration (Windows)
; ----------------------------------------------------------------------------
; Root keys point to the other INI files that make up the IDE configuration.
; Paths are relative to this file unless absolute. Use double backslashes.
; ============================================================================
version=0.5.0
theme=themes/modern-dark.ini
locale=locales/en.ini
shortcuts=shortcuts_win.ini
layout=layout.ini
keywords=keywords.ini
; Dark/light mode for the IDE chrome (menus, dialogs). On Windows the native
; theming of non-client areas is patchy and often looks wrong, so this is
; disabled by default. Values: light, dark, system, or empty to disable.
appearance=
; ----------------------------------------------------------------------------
; Main window position + size (remembered between sessions).
; ----------------------------------------------------------------------------
[window]
y=210
x=422
width=1870
height=1142
; ----------------------------------------------------------------------------
; Paths to external resources.
; ----------------------------------------------------------------------------
[paths]
helpFile=FB-manual-1.10.1.chm
; ----------------------------------------------------------------------------
; Miscellaneous startup options.
; ----------------------------------------------------------------------------
[general]
splashScreen=1
; ----------------------------------------------------------------------------
; Toggle state for togglable menu/toolbar commands.
; ----------------------------------------------------------------------------
[commands]
viewResult=1
viewBrowser=1
showExitCode=0
; ----------------------------------------------------------------------------
; Editor view preferences — all booleans are 0/1.
;   edgeColumn   right-margin column hint (shown when longLine=1).
;   tabSize      width of one tab in spaces.
;   encoding     default encoding for new/untitled documents. Stable keys
;                match TextEncoding::parse — e.g. UTF-8, UTF-8-BOM, UTF-16-LE,
;                Windows-1252, CP437, System (see src/lib/editor/TextEncoding).
;   eolMode      default line-ending for new documents: LF, CRLF, or CR.
; ----------------------------------------------------------------------------
[editor]
whiteSpace=0
longLine=1
indentGuide=1
folderMargin=1
lineNumbers=1
edgeColumn=120
tabSize=4
displayEOL=0
currentLine=1
syntaxHighlight=1
braceHighlight=1
autoIndent=1
keywordCase=Upper
encoding=UTF-8
eolMode=LF
transformKeywords=1
; ----------------------------------------------------------------------------
; Compiler invocation templates.
;   <$fbc>       absolute path from `path` below
;   <$file>      current source file
;   <$terminal>  platform default terminal
;   <$param>     program arguments (Parameters dialog)
; ----------------------------------------------------------------------------
[compiler]
runCommand="\"<$file>\" <$param>"
path=C:\\Users\\Albert\\Developer\\FreeBASIC\\fbc.exe
compileCommand="\"<$fbc>\" \"<$file>\" -s console"
; ----------------------------------------------------------------------------
; File dialog wildcard patterns. Each entry holds only the glob(s) for
; one filter; multiple globs separate with ";" (e.g. *.bas;*.bi). Dialog
; code composes the final wxFileDialog filter as:
;
;     {locale[filetypes.<key>]} (<glob>)|<glob>
;
; so the description comes from the locale file (same key) and the hint
; shown in parentheses is the raw glob from this section. Multiple keys
; can be joined with "|" for dialogs that offer several filters.
;
; wxWidgets reference for the wildcard grammar:
;   https://docs.wxwidgets.org/3.2/classwx_file_dialog.html
; ----------------------------------------------------------------------------
[filePatterns]
freebasic=*.bas;*.bi
html=*.html
session=*.fbs
help=*.chm
compiler=fbc.exe;*.exe
properties=*.ini;*.fbt;*.lng;*.fbl
all=*.*
; ----------------------------------------------------------------------------
; External links shown in the Help menu. Keys are opaque; matching labels
; live in the active locale under [help/external]. If a key is missing from
; the locale, the URL is used as the label. Order here = menu order.
; ----------------------------------------------------------------------------
[help/external]
fbide=https://fbide.freebasic.net
freebasicWebsite=https://www.freebasic.net/
submitIssue=https://github.com/albeva/fbide/issues
