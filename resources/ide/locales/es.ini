; ============================================================================
; Spanish locale
; ============================================================================
name=Española
author=Joseba Epalza
date=2026-05-05
version=0.5.0

; ============================================================================
; Common / generic strings reused across dialogs and messages
; ============================================================================
[common]
welcome=Bienvenido a FBIde!
ok=Vale
cancel=Cancelar
message=Mensaje
error=Error
question=Pregunta

; ============================================================================
; Main menu bar labels
;
; The '&' character marks the following character as the accelerator
; / mnemonic key. The OS renders it underlined and uses it for
; keyboard navigation (e.g. Alt+F opens "&File"). Use '&&' to output
; a literal ampersand.
; ============================================================================
[menus]
file=&Fichero
edit=&Editar
search=&Buscar
view=&Ver
tools=&Herramientas
run=&Ejecutar
help=A&yuda

; ============================================================================
; Commands are actions that appear in the menu and/or on the toolbar.
;
; Each command uses a unique ID that is persistent across locale,
; settings, keybinds, etc.
;
; Properties:
;   name - menu item label
;   help - statusbar text / tooltip shown with the command
; ============================================================================

; --- File menu ---
[commands/new]
name=Nuevo ..
help=Abrir documento vacio nuevo

[commands/open]
name=&Abrir ..
help=Abrir documento nuevo

[commands/clearRecentFiles]
name=&Limpia lista de recientes
help=Limpia los ficheros usados de la lista

[commands/save]
name=&Guardar
help=Guardar Fichero actual

[commands/saveAs]
name=G&uardar como ..
help=Salvar Fichero actual con nuevo nombre

[commands/saveAll]
name=Guardar todo
help=Guardar todos los Ficheros abiertos

[commands/close]
name=Cerrar
help=Cerrar Fichero actual

[commands/closeAll]
name=Cerrar todo
help=Cierra todos los Ficheros abiertos

[commands/newWindow]
name=&Ventana nueva
help=Abrir ventana de editor nueva

[commands/quit]
