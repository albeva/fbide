; ============================================================================
; Main menu bar labels
;
; The '&' character marks the following character as the accelerator
; / mnemonic key. The OS renders it underlined and uses it for
; keyboard navigation (e.g. Alt+F opens "&File"). Use '&&' to output
; a literal ampersand.
; ============================================================================
[menus]
file=&Fichero
edit=&Editar
search=&Buscar
view=&Ver
tools=&Herramientas
run=&Ejecutar
help=A&yuda

; ============================================================================
; Commands are actions that appear in the menu and/or on the toolbar.
;
; Each command uses a unique ID that is persistent across locale,
; settings, keybinds, etc.
;
; Properties:
;   name - menu item label
;   help - statusbar text / tooltip shown with the command
; ============================================================================

