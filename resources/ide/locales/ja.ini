; ============================================================================
; Main menu bar labels
; ============================================================================
[menus]
file=ファイル(&F)
edit=編集(&E)
search=検索(&S)
view=表示(&V)
tools=ツール(&T)
run=実行(&R)
help=ヘルプ(&H)

; ============================================================================
; Commands
; ============================================================================

; --- File menu ---
[commands/new]
name=新規(&N) ..
help=新しい空のドキュメントを開きます

[commands/open]
name=開く(&O) ..
help=ドキュメントを開きます

[commands/clearRecentFiles]
name=履歴をクリア(&C)
help=最近使ったファイルの一覧をクリアします

[commands/save]
name=保存(&S)
help=現在のファイルを保存します

[commands/saveAs]
name=名前を付けて保存(&A) ..
help=現在のファイルを別名で保存します

[commands/saveAll]
name=すべて保存
help=開いているすべてのファイルを保存します

[commands/close]
name=閉じる
help=現在のファイルを閉じます

[commands/closeAll]
name=すべて閉じる
help=開いているすべてのファイルを閉じます

[commands/newWindow]
name=新しいウィンドウ(&W)
help=新しいエディターウィンドウを開きます

[commands/quit]
name=終了(&Q)
help=FBIde を終了します

[commands/sessionLoad]
name=セッションを読み込む
help=以前に保存したセッションを読み込みます

[commands/sessionSave]
name=セッションを保存
help=現在のセッションを保存します

[commands/recentFiles]
name=最近使ったファイル ...
help=最近開いたファイルを再度開きます

; --- Edit menu ---
[commands/undo]
name=元に戻す(&U)
help=直前の操作を取り消します

[commands/redo]
name=やり直し(&R)
help=取り消した操作をやり直します

[commands/cut]
name=切り取り(&T)
help=選択したテキストを切り取ってクリップボードにコピーします

[commands/copy]
name=コピー(&C)
help=選択したテキストをクリップボードにコピーします

[commands/paste]
name=貼り付け(&P)
help=クリップボードの内容を貼り付けます

[commands/selectAll]
name=すべて選択(&A)
help=ドキュメント全体を選択します

[commands/selectLine]
name=行を選択(&L)
help=現在の行を選択します

[commands/indentInc]
name=インデントを増やす(&I)
help=選択範囲を右へインデントします

[commands/indentDec]
name=インデントを減らす
help=選択範囲を左へアンインデントします

[commands/comment]
name=ブロックをコメント化
help=選択したテキストをコメントにします

[commands/uncomment]
name=ブロックのコメントを解除
help=選択範囲からコメント記号を取り除きます

; --- Search menu ---
[commands/find]
name=検索
help=ドキュメント内を検索します

[commands/findNext]
name=次を検索
help=直前の検索を繰り返します

[commands/replace]
name=置換
help=ドキュメント内のテキストを置換します

[commands/gotoLine]
name=指定行へ移動 ...
help=ドキュメントの指定した行へ移動します

; --- View menu ---
[commands/settings]
name=設定
help=エディターの設定を変更します

[commands/viewResult]
name=出力ウィンドウを表示
help=コンソール出力の表を表示します

[commands/viewBrowser]
name=ブラウザー
help=ブラウザーのサイドバーを切り替えます

[commands/viewSubs]
name=サブルーチン ...
help=Sub / Function ブラウザーを開きます

[commands/format]
name=整形
help=ソースコードの整形を変更します

[commands/compilerLog]
name=ログを表示
help=コンパイルログを表示します

; --- Run menu ---
[commands/compile]
name=コンパイル
help=現在のファイルをコンパイルします

[commands/compileAndRun]
name=コンパイル && 実行
help=現在のファイルをコンパイルして実行します

[commands/run]
name=実行
help=直前にコンパイルしたファイルを実行します

[commands/quickRun]
name=クイック実行
help=保存せずにプログラムを実行します(一時ファイルを使用)

[commands/killProcess]
name=プロセスを終了
help=実行中のコンパイラまたはプログラムを停止します

[commands/cmdPrompt]
name=コマンドプロンプト
help=コマンドプロンプトを開きます

[commands/parameters]
name=パラメーター(&P) ...
help=プログラムに渡すパラメーターを設定します

[commands/showExitCode]
name=終了コードを表示(&S)
help=プログラムの終了コードを表示します

[commands/activePaths]
name=アクティブパス
help=実行 / コンパイル時に有効なパスを設定します

; --- Help menu ---
[commands/help]
name=ヘルプ(&H) ...
help=ヘルプを表示します

[commands/about]
name=バージョン情報(&A) ...
help=バージョン情報ダイアログを表示します

