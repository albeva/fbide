[commands/gotoLine]
name=Goto line...
help=Goto to the line in document

; --- View menu ---
[commands/settings]
name=Settings
help=Set editor settings

[commands/viewResult]
name=View result window
help=Shows table with console outputs

[commands/viewSubs]
name=Subs...
help=Open sub, function browser

[commands/format]
name=Format
help=Change the format of the code

[commands/compilerLog]
name=Show log
help=Shows compilation log

; --- Run menu ---
[commands/compile]
name=Compile
help=Compile current file

[commands/compileAndRun]
name=Compile && run
help=Compile and run current file

[commands/run]
name=Run
help=Run previously compiled file

[commands/quickRun]
name=Quick run
help=Run program without saving (uses temp file)

[commands/killProcess]
name=Kill process
help=Terminate the running compiler or program

[commands/cmdPrompt]
name=CMD prompt
help=Open command prompt

[commands/parameters]
name=&Parameters...
help=Set parameters to pass to your program

[commands/showExitCode]
name=&Show exit code
help=Show's program exit code.

[commands/activePaths]
name=Active paths
help=Set paths active when running/compiling

; --- Help menu ---
[commands/help]
name=&Help...
help=Show help

[commands/about]
name=&About...
help=Show about dialog

; ----------------------------------------------------------------------------
; Labels for external Help menu links. Keys mirror the config's
