; ============================================================================
; English locale
; ============================================================================
name=English
author=albeva
date=2026-04-17
version=0.5.0

; ============================================================================
; Common / generic strings reused across dialogs and messages
; ============================================================================
[common]
welcome=Welcome to FBIde!
ok=&OK
cancel=&Cancel
message=Message
error=Error
question=Question

; ============================================================================
; Main menu bar labels
;
; The '&' character marks the following character as the accelerator
; / mnemonic key. The OS renders it underlined and uses it for
; keyboard navigation (e.g. Alt+F opens "&File"). Use '&&' to output
; a literal ampersand.
; ============================================================================
[menus]
file=&File
edit=&Edit
search=&Search
view=&View
tools=&Tools
run=&Run
help=&Help

; ============================================================================
; Commands are actions that appear in the menu and/or on the toolbar.
;
; Each command uses a unique ID that is persistent across locale,
; settings, keybinds, etc.
;
; Properties:
;   name - menu item label
;   help - statusbar text / tooltip shown with the command
; ============================================================================

; --- File menu ---
[commands/new]
name=New ..
help=Open new empty document

[commands/open]
name=&Open ..
help=Open new document

[commands/clearRecentFiles]
name=&Clear recent files
help=Clear all recent files from this menu

[commands/save]
name=&Save
help=Save current file

[commands/saveAs]
name=Save &as ..
help=Save current file under new name

[commands/saveAll]
name=Save all
help=Save all opened files

[commands/close]
name=Close
help=Close current file

[commands/closeAll]
name=Close all
help=Close all opened files

[commands/newWindow]
name=New &window
help=Open new editor window

[commands/quit]
name=&Quit
help=Quit FBIde

[commands/sessionLoad]
name=Load session
help=Loads previously saved session

[commands/sessionSave]
name=Save session
help=Saves current session

[commands/recentFiles]
name=Recent Files...
help=Re-open recently opened files

; --- Edit menu ---
[commands/undo]
name=&Undo
help=Undo last action

[commands/redo]
name=&Redo
help=Redo last action

[commands/cut]
