help=Cut selected text and copy to clipboard

[commands/copy]
name=&Copy
help=Copy selected text to clipboard

[commands/paste]
name=&Paste
help=Paste from clipboard

[commands/selectAll]
name=&Select all
help=Select whole document

[commands/selectLine]
name=Select &line
help=Select current line

[commands/indentInc]
name=&Indent increase
help=Indent selected text to right

[commands/indentDec]
name=Indent reduce
help=Unindent selected text to left

[commands/comment]
name=Comment block
help=Comments out selected text

[commands/uncomment]
name=Uncomment block
help=Uncomment selected text

; --- Search menu ---
[commands/find]
name=Find
help=Find in the document

[commands/findNext]
name=Find next
help=Repeat last search

[commands/replace]
name=Replace
