; ============================================================================
; File type descriptions used in Open / Save dialog filters.
;
; Plain human-readable labels only — the parenthesised extension hint
; (e.g. "(*.bas;*.bi)") is NOT part of these strings. It lives in the
; platform config file's `[filePatterns]` section next to the actual
; glob; dialog code composes the final filter as
; `<description> (<glob>)|<glob>` using the same key on both sides.
; ============================================================================
[filetypes]
