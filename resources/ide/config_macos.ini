; ============================================================================
; FBIde configuration (macOS)
; ----------------------------------------------------------------------------
; Root keys point to the other INI files that make up the IDE configuration.
; Paths are relative to this file unless absolute. Use double backslashes.
; ============================================================================
version=0.5.0
theme=themes/modern-light.ini
locale=locales/en.ini
shortcuts=shortcuts_macos.ini
layout=layout.ini
keywords=keywords.ini
; Dark/light mode for the IDE chrome (menus, dialogs).
; Values: light, dark, system, or empty to disable.
appearance=system
; ----------------------------------------------------------------------------
; AI settings
; ----------------------------------------------------------------------------
[ai]
systemPrompt=You are a coding assistant embedded in FBIde, an IDE for the FreeBASIC programming language (open-source compiler at freebasic.net — not Visual Basic, VBA, or QBasic, though FreeBASIC is largely QBASIC-compatible). Answer questions about FreeBASIC code and its standard library. Write code in correct FreeBASIC syntax (Dim, Sub/Function, #include) using the default -lang fb dialect unless told otherwise. Be concise and practical; explain specifics of FreeBASIC behavior when reviewing the user's code. ALWAYS tag fenced code blocks with a language so FBIde can highlight them: use ```freebasic (or ```fb, ```basic, ```bas) for FreeBASIC, and the appropriate tag (```bash, ```ini, ```json, ```cpp, etc.) for everything else — never emit an untagged ``` fence. For live edits to files in the workspace, emit Aider-style SEARCH/REPLACE blocks instead of fenced code: a line `<<<<<<< SEARCH <path>`, the exact existing text verbatim, a line `=======`, the new text, then a line `>>>>>>> REPLACE`. Do NOT wrap SEARCH/REPLACE blocks in a code fence. When generating FreeBASIC code, choose identifiers that do not collide with FreeBASIC's large reserved-keyword set — avoid names like Type, End, Open, Close, Get, Put, Print, Input, Date, Time, Timer, Color, Cls, Dim, Sub, Function, Declare, Shared, Static, Const, As, Step, Next, For, Do, Loop, While, Wend, If, Then, Else, Select, Case, Return, Exit, Continue, Byte, Short, Integer, Long, Single, Double, String, Any, Ptr, ByRef, ByVal. Prefer descriptive or prefixed names (e.g. `fileHandle`, `userInput`, `idx`) when uncertain.
active=claude-cli
fontSize=12
[ai/anthropic]
provider=anthropic
;model=
;key=
[ai/claude-cli]
provider=claude-cli
;model=
;claudePath=
[ai/gemini]
provider=gemini
;model=
;key=
[ai/ollama]
provider=ollama
;model=
;endpoint=
[ai/mock]
provider=mock
; ----------------------------------------------------------------------------
; Main window position + size (remembered between sessions).
; ----------------------------------------------------------------------------
[window]
; ----------------------------------------------------------------------------
; Paths to external resources.
; ----------------------------------------------------------------------------
[paths]
; ----------------------------------------------------------------------------
; Miscellaneous startup options.
; ----------------------------------------------------------------------------
[general]
splashScreen=1
; ----------------------------------------------------------------------------
; Toggle state for togglable menu/toolbar commands.
; ----------------------------------------------------------------------------
[commands]
; ----------------------------------------------------------------------------
; Editor view preferences — all booleans are 0/1.
;   edgeColumn   right-margin column hint (shown when longLine=1).
;   tabSize      width of one tab in spaces.
;   encoding     default encoding for new/untitled documents. Stable keys
;                match TextEncoding::parse — e.g. UTF-8, UTF-8-BOM, UTF-16-LE,
;                Windows-1252, CP437, System (see src/lib/editor/TextEncoding).
;   eolMode      default line-ending for new documents: LF, CRLF, or CR.
; ----------------------------------------------------------------------------
[editor]
whiteSpace=0
longLine=1
indentGuide=0
folderMargin=0
lineNumbers=1
edgeColumn=120
tabSize=4
displayEOL=0
currentLine=1
syntaxHighlight=1
braceHighlight=1
autoIndent=1
keywordCase=Lower
encoding=UTF-8
eolMode=LF
minimapWidth=120
; ----------------------------------------------------------------------------
; Compiler invocation templates.
;   <$fbc>       absolute path from `path` below
;   <$file>      current source file
;   <$terminal>  launcher prefix that runs the program in a new
;                terminal window (cmd.exe / x-terminal-emulator -e / ...)
;   <$param>     program arguments (Parameters dialog)
; ----------------------------------------------------------------------------
[compiler]
path=
runCommand=osascript -e 'tell application "Terminal" to activate' -e 'tell application "Terminal" to do script "cd <$file_path>;./<$file_name>"'
compileCommand="\"<$fbc>\" \"<$file>\""
terminal=
; ----------------------------------------------------------------------------
; File dialog wildcard patterns. Each entry holds only the glob(s) for
; one filter; multiple globs separate with ";" (e.g. *.bas;*.bi). Dialog
; code composes the final wxFileDialog filter as:
;
;     {locale[filetypes.<key>]} (<glob>)|<glob>
;
; so the description comes from the locale file (same key) and the hint
; shown in parentheses is the raw glob from this section. Multiple keys
; can be joined with "|" for dialogs that offer several filters.
;
; wxWidgets reference for the wildcard grammar:
;   https://docs.wxwidgets.org/3.2/classwx_file_dialog.html
; ----------------------------------------------------------------------------
[filePatterns]
freebasic=*.bas;*.bi
html=*.html
session=*.fbs
compiler=*
properties=*.ini;*.fbt;*.lng;*.fbl
markdown=*.md;*.markdown
batch=*.bat;*.cmd
bash=*.sh;*.bash
makefile=*.mk;*.make;Makefile;makefile;GNUmakefile
json=*.json;*.json5
css=*.css
all=*.*
; ----------------------------------------------------------------------------
; External links shown in the Help menu. Keys are opaque; matching labels
; live in the active locale under [help/external]. If a key is missing from
; the locale, the URL is used as the label. Order here = menu order.
; ----------------------------------------------------------------------------
[help/external]
fbide=https://fbide.freebasic.net
freebasicWebsite=https://www.freebasic.net/
submitIssue=https://github.com/albeva/fbide/issues
