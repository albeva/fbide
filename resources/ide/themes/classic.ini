; ============================================================================
; Classic theme — matches the look of the original FBIde.
; ----------------------------------------------------------------------------
; Colours use #RRGGBB hex. An omitted foreground or background inherits the
; corresponding colour from [Default] at render time.
;
; Per-style flags:
;   bold, italic, underlined — 0/1
;
; Keyword groups (see keywords.ini for membership):
;   Keywords         reserved words (if/then/else/sub/function/...)
;   KeywordTypes     built-in types (integer/string/double/...)
;   KeywordOperators word operators (and/or/not/mod/...)
;   KeywordConstants intrinsics (__fb_*/assert/rgb/...)
;   KeywordLibrary   ukeywords (FB library)
;   KeywordCustom    user-defined group 2
;   KeywordAsm1      instruction mnemonics (asm blocks only)
;   KeywordAsm2      registers             (asm blocks only)
; ============================================================================
version=0.5.0.beta-2
font=Courier New
fontSize=12
separator=#F0F0F0
; ----------------------------------------------------------------------------
; Editor-wide entries (non-syntax). Colours-only unless noted.
; ----------------------------------------------------------------------------
[lineNumber]
background=#C0C0C0
foreground=#FFFFFF
[selection]
background=#C0C0C0
foreground=#FFFFFF
; Matching bracket highlight.
[brace]
bold=0
italic=0
underlined=0
; Unmatched / mismatched bracket highlight.
[badBrace]
bold=0
italic=0
underlined=0
foreground=#FF0000
; ----------------------------------------------------------------------------
; Syntax categories. [Default] is the baseline every other style inherits
; its missing foreground/background from.
; ----------------------------------------------------------------------------
[Default]
foreground=#000000
background=#FFFFFF
bold=0
italic=0
underlined=0
[Comment]
foreground=#808080
bold=0
italic=1
underlined=0
[MultilineComment]
foreground=#808080
bold=0
italic=1
underlined=0
[Number]
foreground=#0000FF
bold=0
italic=0
underlined=0
[String]
foreground=#FF0000
bold=0
italic=0
underlined=0
; Unterminated string literal (missing closing quote).
[StringOpen]
foreground=#FF0000
bold=1
italic=0
underlined=0
[Identifier]
foreground=#000000
bold=0
italic=0
underlined=0
[Keywords]
bold=1
italic=0
underlined=0
[KeywordTypes]
foreground=#0000FF
bold=1
italic=0
underlined=0
[KeywordOperators]
foreground=#0080C0
bold=1
italic=0
underlined=0
[KeywordConstants]
foreground=#800040
bold=1
italic=0
underlined=0
; User-defined keyword group 1.
[KeywordLibrary]
bold=1
italic=0
underlined=0
; User-defined keyword group 2.
[KeywordCustom]
bold=1
italic=0
underlined=0
; x86/x64 instruction mnemonics (asm ... end asm blocks).
[KeywordAsm1]
foreground=#800040
bold=1
italic=0
underlined=0
; x86/x64 registers (asm ... end asm blocks).
[KeywordAsm2]
foreground=#0080C0
bold=0
italic=0
underlined=0
[Operator]
foreground=#0080C0
bold=1
italic=0
underlined=0
[Label]
bold=0
italic=0
underlined=0
[Preprocessor]
foreground=#408080
bold=0
italic=0
underlined=0
; Lexer-detected syntax errors.
[Error]
bold=0
italic=0
underlined=0
[KeywordPP]
foreground=#408080
bold=1
italic=0
underlined=0
[foldMargin]
background=#B9B9B9
foreground=#FFFFFF
