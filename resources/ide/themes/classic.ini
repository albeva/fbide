; ============================================================================
; Classic theme — matches the look of the original FBIde.
; ----------------------------------------------------------------------------
; Colours use #RRGGBB hex. An omitted foreground or background inherits the
; corresponding colour from [Default] at render time.
;
; Per-style flags:
;   bold, italic, underlined — 0/1
;
; Keyword groups are ordered tiers (see keywords.ini for membership):
;   Keyword1 reserved words (if/then/else/sub/function/...)
;   Keyword2 built-in types (integer/string/double/...)
;   Keyword3 word operators (and/or/not/mod/...)
;   Keyword4 intrinsics (__fb_*/assert/rgb/...)
;   Keyword5 reserved for user-defined group
;   Keyword6 reserved for user-defined group
; ============================================================================
version=0.5.0
font=Courier New
fontSize=12
; ----------------------------------------------------------------------------
; Editor-wide entries (non-syntax). Colours-only unless noted.
; ----------------------------------------------------------------------------
[lineNumber]
background=#C0C0C0
[selection]
; Matching bracket highlight.
[brace]
bold=0
italic=0
underlined=0
; Unmatched / mismatched bracket highlight.
[badBrace]
bold=0
italic=0
underlined=0
foreground=#FF0000
; ----------------------------------------------------------------------------
; Syntax categories. [Default] is the baseline every other style inherits
; its missing foreground/background from.
; ----------------------------------------------------------------------------
[Default]
foreground=#000000
background=#FFFFFF
bold=0
italic=0
underlined=0
[Comment]
foreground=#808080
bold=0
italic=1
underlined=0
[MultilineComment]
foreground=#808080
bold=0
italic=1
underlined=0
[Number]
foreground=#0000FF
bold=0
italic=0
underlined=0
[String]
foreground=#FF0000
bold=0
italic=0
underlined=0
; Unterminated string literal (missing closing quote).
[StringOpen]
foreground=#FF0000
bold=1
italic=0
underlined=0
[Identifier]
foreground=#000000
bold=0
italic=0
underlined=0
[Keyword1]
bold=1
italic=0
underlined=0
[Keyword2]
foreground=#0000FF
bold=1
italic=0
underlined=0
[Keyword3]
foreground=#0080C0
bold=1
italic=0
underlined=0
[Keyword4]
foreground=#800040
bold=1
italic=0
underlined=0
[Keyword5]
bold=1
italic=0
underlined=0
[Keyword6]
bold=1
italic=0
underlined=0
[Operator]
foreground=#0080C0
bold=1
italic=0
underlined=0
[Label]
bold=0
italic=0
underlined=0
[Constant]
bold=0
italic=0
underlined=0
[Preprocessor]
foreground=#408080
bold=0
italic=0
underlined=0
; Lexer-detected syntax errors.
[Error]
bold=0
italic=0
underlined=0
