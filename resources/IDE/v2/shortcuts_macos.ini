; Shortcut definitions for macOS
;
; Note: wxWidgets on macOS auto-maps "Ctrl+" in accelerators to the Command
; (Cmd / ⌘) key. Use real Control via "RawCtrl+" only when a literal Ctrl is
; required.
version=0.5.0

; ============================================================================
; Define system shortcuts to use with menu and toolbar commands.
; Each command ID is shared with layout, locales, etc.
; Only commands that have a shortcut are listed.
;
; More info here:
; https://docs.wxwidgets.org/latest/classwx_menu_item.html#a8b0517fb35e3eada66b51568aa87f261
; ============================================================================
[commands]

; --- File ---
new=Ctrl+N
open=Ctrl+O
save=Ctrl+S
saveAs=Ctrl+Shift+S
close=Ctrl+W
newWindow=Ctrl+Shift+N
quit=Ctrl+Q

; --- Edit ---
undo=Ctrl+Z
redo=Ctrl+Shift+Z
cut=Ctrl+X
copy=Ctrl+C
paste=Ctrl+V
selectAll=Ctrl+A
; selectLine: no macOS convention — omit shortcut
; indentInc/indentDec: Tab/Shift+Tab handled by Scintilla internally
comment=Ctrl+/
uncomment=Ctrl+Shift+/

; --- Search ---
find=Ctrl+F
findNext=Ctrl+G
replace=Ctrl+Alt+F
gotoLine=Ctrl+L

; --- View ---
viewResult=F4
viewSubs=F2

; --- Run (Xcode-style) ---
compile=Ctrl+B
compileAndRun=Ctrl+R
run=Ctrl+Shift+R
quickRun=F5
cmdPrompt=Ctrl+Alt+T

; --- Help ---
help=F1
