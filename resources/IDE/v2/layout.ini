version=0.5.0

; ============================================================================
; Menu bar layout.
; Each menu entry has a unique ID shared with locale, shortcuts, etc.
; Use "-" for a separator. "recentFiles" is a dynamic submenu of recent files.
; ============================================================================
menus=file,edit,search,view,run,help

; ============================================================================
; Toolbar layout. Uses the same command IDs as menus. "-" = separator.
; ============================================================================
toolbar=new,open,save,saveAll,close,-,cut,copy,paste,-,undo,redo,-,compile,run,compileAndRun,quickRun,viewResult

[menu]
file=new,open,recentFiles,-,save,saveAs,saveAll,-,sessionLoad,sessionSave,-,close,closeAll,-,newWindow,quit
recentFiles=
edit=undo,redo,-,cut,copy,paste,-,selectAll,selectLine,-,indentInc,indentDec,-,comment,uncomment
search=find,findNext,replace,gotoLine
view=settings,format,viewResult,viewSubs,compilerLog
run=compile,compileAndRun,run,quickRun,cmdPrompt,parameters,showExitCode
help=help,quickKeys,readMe,-,about
