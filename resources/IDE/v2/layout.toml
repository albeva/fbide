version = "0.5.0"

#=============================================================================
# Define layout of menus
# Each menu entry has a unique ID shared with locale, keybinds, etc.
# Use "-" for a separator. "fileHistory" is a dynamic submenu of recent files.
#
# menus is an array of main menus in display order.
#=============================================================================
menus = ["file", "edit", "search", "view", "run", "help"]

menu.file = [
    "new",
    "open",
    "recentFiles",
    "-",
    "save",
    "saveAs",
    "saveAll",
    "-",
    "sessionLoad",
    "sessionSave",
    "-",
    "close",
    "closeAll",
    "-",
    "newWindow",
    "quit",
]

menu.recentFiles = []

menu.edit = [
    "undo",
    "redo",
    "-",
    "cut",
    "copy",
    "paste",
    "-",
    "selectAll",
    "selectLine",
    "-",
    "indentInc",
    "indentDec",
    "-",
    "comment",
    "uncomment",
]

menu.search = [
    "find",
    "findNext",
    "replace",
    "gotoLine",
]

menu.view = [
    "settings",
    "format",
    "viewResult",
    "viewSubs",
    "compilerLog",
]

menu.run = [
    "compile",
    "compileAndRun",
    "run",
    "quickRun",
    "cmdPrompt",
    "parameters",
    "showExitCode",
]

menu.help = [
    "help",
    "quickKeys",
    "readMe",
    "-",
    "about",
]

#=============================================================================
# Toolbar defines actions which appear on the toolbar.
# Uses the same command IDs as menus. "-" = separator.
#=============================================================================
toolbar = [
