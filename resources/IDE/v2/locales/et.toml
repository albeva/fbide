# ============================================================================
# Estonian locale
# ============================================================================
name = "Eesti"
author = "albeva"
date = 2026-04-18
version = "0.5.0"

# ============================================================================
# Common / generic strings reused across dialogs and messages
# ============================================================================
[common]
welcome = "Tere tulemast FBIde'sse!"
ok = "&OK"
cancel = "&Tühista"
message = "Teade"
error = "Viga"
question = "Küsimus"

# ============================================================================
# Main menu bar labels
#
# The '&' character marks the following character as the accelerator
# / mnemonic key. The OS renders it underlined and uses it for
# keyboard navigation (e.g. Alt+F opens "&File"). Use '&&' to output
# a literal ampersand.
# ============================================================================
[menus]
file = "&Fail"
edit = "&Redigeeri"
search = "&Otsi"
view = "&Vaatle"
tools = "&Vahendid"
run = "&Käivita"
help = "&Abi"

# ============================================================================
# Commands are actions that appear in the menu and/or on the toolbar.
#
# Each command uses a unique ID that is persistent across locale,
# settings, keybinds, etc.
#
# Properties:
#   name - menu item label
#   help - statusbar text / tooltip shown with the command
#
# The '&' character in 'name' marks the following character as the
# accelerator / mnemonic key. The OS renders it underlined and uses
# it for keyboard navigation (e.g. Alt+F on Windows opens the "&File"
# menu). Use '&&' to output a literal ampersand (see "Compile && run").
# ============================================================================
[commands]

# --- File menu ---
[commands.new]
name = "&Uus .."
help = "Tekita uus, tühi dokument"

[commands.open]
name = "&Ava .."
help = "Ava uus dokument"

[commands.clearRecentFiles]
name = "&Eemalda"
help = "Eemalda hiljutised failid sellest menüüst"

[commands.recentFiles]
name = "Hiljutised failid..."
help = "Ava file mida avasid hiljuti"

[commands.save]
name = "&Salvesta"
help = "Salvesta fail"

[commands.saveAs]
name = "&Muuda nimi .."
help = "Salvesta fail uue nimega"

[commands.saveAll]
name = "Salvesta &kõik"
help = "Salvesta kõik avatud failid"

[commands.close]
name = "Sulge"
help = "Sulge käesolev fail"

[commands.closeAll]
name = "Sulge kõik"
help = "Sulgeb kõik avatud failid"

[commands.newWindow]
name = "Uus ak&en"
help = "Ava uus editori aken"

[commands.quit]
name = "&Välju"
help = "Välju FBIde'st"

[commands.sessionLoad]
name = "Lae sessioon"
help = "Laeb salvestatud sessiooni"

[commands.sessionSave]
name = "Salvesta sessioon"
help = "Salvestab käesoleva sessiooni"

# --- Edit menu ---
[commands.undo]
name = "&Võta tagasi"
help = "Tühista viimane tegevus"

[commands.redo]
name = "&Ennista"
help = "Võta viimane tühistus tagasi"

[commands.cut]
name = "&Lõika"
help = "Lõikab märgistatud teksti lõikelauale"

[commands.copy]
